<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Code Visualizer</h1>
            <p class="subtitle">CODE_VISUALIZER</p>
        </header>

        <div class="controls-panel">
            <div class="control-group">
                <label for="fileInput">选择代码文件</label>
                <input type="file" id="fileInput" accept=".py,.js,.cpp,.java,.txt">
            </div>

            <div class="control-group">
                <label>支持语言</label>
                <span class="supported-langs">Python, JS, C++, Java 等</span>
            </div>

            <div class="settings-panel">
                <h3>⚙️ 高级设置</h3>
                
                <div class="setting-item">
                    <label for="typingSpeed">打字速度 (ms/字符)</label>
                    <input type="range" id="typingSpeed" min="10" max="500" value="50">
                    <span id="typingSpeedValue">50</span>
                </div>

                <div class="setting-item">
                    <label for="thinkTime">思考时间 (ms)</label>
                    <input type="range" id="thinkTime" min="0" max="2000" value="500">
                    <span id="thinkTimeValue">500</span>
                </div>

                <div class="setting-item">
                    <label for="cameraShake">相机摇晃</label>
                    <select id="cameraShake">
                        <option value="none">关闭</option>
                        <option value="light">轻微</option>
                        <option value="medium">中等</option>
                        <option value="heavy">强烈</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="showLineNumbers">显示行号</label>
                    <input type="checkbox" id="showLineNumbers" checked>
                </div>

                <div class="setting-item">
                    <label for="highlightSyntax">语法高亮</label>
                    <input type="checkbox" id="highlightSyntax" checked>
                </div>
            </div>

            <div class="status-bar">
                <span id="status">READY</span>
                <span id="progressInfo"></span>
            </div>

            <button id="startBtn" class="btn-primary">开始可视化</button>
            <button id="resetBtn" class="btn-secondary">重置</button>
        </div>

        <div class="code-display">
            <div class="code-header">
                <div class="window-controls">
                    <span class="control-dot red"></span>
                    <span class="control-dot yellow"></span>
                    <span class="control-dot green"></span>
                </div>
                <span class="filename" id="filename">未选择文件</span>
                <span class="line-count" id="lineCount">0 行</span>
            </div>
            <pre><code id="codeContent"></code></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
