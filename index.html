<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Code Visualizer</h1>
            <p class="subtitle">CODE_VISUALIZER</p>
        </header>

        <div class="controls-panel">
            <div class="control-group">
                <label>📁 选择代码文件</label>
                <input type="file" id="codeFile" accept=".py,.js,.cpp,.java,.txt" />
            </div>

            <div class="control-group">
                <label>⚡ 打字速度 (字符/秒)</label>
                <input type="range" id="typingSpeed" min="1" max="100" value="30" />
                <span id="speedValue">30</span>
            </div>

            <div class="control-group">
                <label>🤔 思考时间 (毫秒)</label>
                <input type="range" id="thinkTime" min="0" max="2000" value="500" />
                <span id="thinkValue">500</span>
            </div>

            <div class="control-group">
                <label>📷 相机摇晃</label>
                <label class="toggle">
                    <input type="checkbox" id="cameraShake" />
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-group">
                <label>📊 显示行数</label>
                <label class="toggle">
                    <input type="checkbox" id="showLineNumbers" checked />
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-group">
                <label>🎨 代码高亮</label>
                <label class="toggle">
                    <input type="checkbox" id="syntaxHighlight" checked />
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="status-bar">
            <span id="fileInfo">支持 Python, JS, C++, Java 等</span>
            <span id="progressInfo">READY</span>
        </div>

        <div class="editor-container" id="editorContainer">
            <div class="line-numbers" id="lineNumbers"></div>
            <pre class="code-display" id="codeDisplay"><code id="codeContent"></code></pre>
        </div>

        <div class="action-buttons">
            <button id="startBtn" class="btn btn-primary">▶ 开始演示</button>
            <button id="pauseBtn" class="btn btn-secondary">⏸ 暂停</button>
            <button id="resetBtn" class="btn btn-danger">🔄 重置</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
