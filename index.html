<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Flow - Immersive Typing</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #e0e0e0;
            --accent-color: #00ff9d; /* 荧光绿 */
            --dim-color: #444;
            --line-num-color: #333;
            --font-main: 'Consolas', 'Monaco', 'Courier New', monospace;
            --camera-lag: 0.08; /* 摄像机延迟系数，越小越慢 */
            --shake-intensity: 2px; /* 基础晃动幅度 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden; /* 禁止原生滚动，由 JS 控制摄像机 */
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* 顶部标题栏 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 20px;
            z-index: 100;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        h1 {
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .author {
            font-size: 12px;
            color: var(--accent-color);
            margin-top: 5px;
            opacity: 0.7;
        }

        /* 主容器 - 摄像机视口 */
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 代码世界 - 被摄像机观察的对象 */
        #world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 初始居中 */
            will-change: transform;
            display: flex;
            flex-direction: row;
            min-width: 800px; /* 保证代码不挤 */
        }

        /* 行号栏 */
        #line-numbers {
            padding: 20px 10px;
            text-align: right;
            color: var(--line-num-color);
            font-size: 16px;
            line-height: 1.6;
            border-right: 1px solid var(--dim-color);
            margin-right: 20px;
            user-select: none;
            min-width: 60px;
        }

        /* 代码显示区 */
        #code-display {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre;
            color: var(--text-color);
            position: relative;
        }

        /* 光标 */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--accent-color);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 10px var(--accent-color);
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* 语法高亮类 */
        .kw { color: #ff79c6; } /* 关键字 */
        .str { color: #f1fa8c; } /* 字符串 */
        .com { color: #6272a4; font-style: italic; } /* 注释 */
        .func { color: #8be9fd; } /* 函数 */
        .num { color: #bd93f9; } /* 数字 */
        .op { color: #ff79c6; } /* 操作符 */

        /* 初始覆盖层 (文件选择) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 13, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.5s;
        }

        #overlay.hidden { opacity: 0; pointer-events: none; }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px 40px;
            font-family: var(--font-main);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-color);
        }

        input[type="file"] { display: none; }

        .settings {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="range"] {
            accent-color: var(--accent-color);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            #world { min-width: 95vw; }
            #line-numbers { display: none; } /* 手机端隐藏行号以节省空间 */
            #code-display { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Code Visualization</h1>
        <div class="author">Github: hexo141 | Qwen</div>
    </header>

    <div id="viewport">
        <div id="world">
            <div id="line-numbers"></div>
            <div id="code-display"></div>
        </div>
    </div>

    <div id="overlay">
        <button class="btn" onclick="document.getElementById('fileInput').click()">选择代码文件</button>
        <input type="file" id="fileInput" accept=".js,.py,.html,.css,.json,.txt,.md,.cpp,.java">
        
        <div class="settings">
            <div class="setting-item">
                <label>打字速度</label>
                <input type="range" id="speedRange" min="10" max="200" value="60">
            </div>
            <div class="setting-item">
                <label>思考停顿</label>
                <input type="range" id="pauseRange" min="0" max="100" value="50">
            </div>
            <div class="setting-item">
                <label>镜头晃动</label>
                <input type="range" id="shakeRange" min="0" max="10" value="3">
            </div>
        </div>
        <p style="margin-top:20px; color:#444; font-size:12px;">支持自动语法高亮 & 沉浸式镜头跟随</p>
    </div>

    <script>
        // 配置与状态
        const config = {
            baseSpeed: 60, // ms per char
            pauseFactor: 0.5, // 停顿系数
            shakeIntensity: 3 // 像素
        };

        const els = {
            overlay: document.getElementById('overlay'),
            fileInput: document.getElementById('fileInput'),
            world: document.getElementById('world'),
            codeDisplay: document.getElementById('code-display'),
            lineNumbers: document.getElementById('line-numbers'),
            speed: document.getElementById('speedRange'),
            pause: document.getElementById('pauseRange'),
            shake: document.getElementById('shakeRange')
        };

        let codeContent = "";
        let isTyping = false;
        let cameraY = 0;
        let targetY = 0;
        let currentCharIndex = 0;
        
        // 监听设置变化
        els.speed.oninput = (e) => config.baseSpeed = 210 - e.target.value; 
        els.pause.oninput = (e) => config.pauseFactor = e.target.value / 100;
        els.shake.oninput = (e) => config.shakeIntensity = e.target.value;

        // 文件读取
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                codeContent = event.target.result;
                initEditor(codeContent);
                els.overlay.classList.add('hidden');
                startTyping();
            };
            reader.readAsText(file);
        });

        // 初始化编辑器结构
        function initEditor(code) {
            els.codeDisplay.innerHTML = '';
            els.lineNumbers.innerHTML = '';
            
            const lines = code.split('\n');
            let lineHtml = '';
            let numHtml = '';

            lines.forEach((line, index) => {
                // 生成行号
                numHtml += `<div>${index + 1}</div>`;
                // 生成代码行容器 (初始为空，稍后填充)
                // 我们给每一行一个 ID 以便定位
                lineHtml += `<div id="line-${index}" class="code-line"></div>`;
            });

            els.lineNumbers.innerHTML = numHtml;
            els.codeDisplay.innerHTML = lineHtml;
        }

        // 轻量级语法高亮 (正则匹配)
        function highlightLine(lineText) {
            // 转义 HTML
            let html = lineText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // 简单的正则规则 (可根据需要扩展)
            // 1. 注释 (// 或 # 或 /* */)
            html = html.replace(/(\/\/.*$|#.*$|\/\*[\s\S]*?\*\/)/gm, '<span class="com">$1</span>');
            
            // 2. 字符串 ("..." or '...' or `...`) - 避免匹配到注释里的
            html = html.replace(/(['"`])(?:(?=(\\?))\2.)*?\1/g, '<span class="str">$&</span>');

            // 3. 关键字 (JS/Python 常见)
            const keywords = /\b(const|let|var|function|return|if|else|for|while|class|import|from|def|print|async|await|try|catch|new|this|super)\b/g;
            html = html.replace(keywords, '<span class="kw">$1</span>');

            // 4. 函数调用
            html = html.replace(/\b([a-zA-Z_]\w*)(?=\()/g, '<span class="func">$1</span>');

            // 5. 数字
            html = html.replace(/\b(\d+)\b/g, '<span class="num">$1</span>');

            return html;
        }

        // 打字机逻辑
        async function startTyping() {
            isTyping = true;
            const lines = codeContent.split('\n');
            const lineElements = document.querySelectorAll('.code-line');
            
            // 创建光标
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            
            // 将光标放入第一行
            if(lineElements[0]) lineElements[0].appendChild(cursor);

            for (let i = 0; i < lines.length; i++) {
                const lineText = lines[i];
                const lineEl = lineElements[i];
                
                // 更新目标 Y 位置 (让当前行保持在视野中心偏上)
                // 获取该行相对于 #world 的位置
                // 注意：因为我们是动态添加内容，offsetTop 会变化
                targetY = lineEl.offsetTop; 

                // 逐字打印当前行
                // 为了高亮，我们不能直接 innerHTML += char，因为会破坏标签结构
                // 策略：预先计算好高亮 HTML，然后逐个字符“揭示”或者简单地逐字插入文本节点
                // 为了视觉效果最好，我们采用“逐字插入文本，最后替换为高亮 HTML"的策略会有闪烁。
                // 更好的策略：逐字构建 HTML 字符串。
                
                let currentLineHtml = "";
                
                for (let j = 0; j < lineText.length; j++) {
                    const char = lineText[j];
                    
                    // 移动光标到当前字符后
                    // 由于我们是构建字符串，光标始终在最后
                    // 我们只需要更新 DOM
                    
                    // 简单的打字效果：直接添加字符
                    // 为了性能，每 5 个字符更新一次 DOM，或者每行更新一次？
                    // 不，为了“打字机”感，必须逐个字符更新。
                    
                    // 优化：构建当前行的片段
                    // 这里为了简单演示高亮，我们先打纯文本，打完一行后瞬间高亮？
                    // 不，用户要求“编码过程上色”。
                    // 实时高亮非常消耗性能。折中方案：
                    // 1. 打字时是纯白色。
                    // 2. 打完一个词或一行后上色。
                    // 或者：打字时就是带颜色的（预计算）。
                    
                    // 采用预计算高亮方案：
                    // 我们其实可以预先算出整行的高亮 HTML，然后每次只显示前 N 个字符的 HTML？
                    // 这很难，因为标签是成对的。
                    
                    // **最终方案**：打字时显示纯文本（白色），当一行打完（或遇到特定符号）时，将该行替换为高亮版本。
                    // 这样既保证了流畅度，又有上色效果。
                    
                    lineEl.textContent = lineText.substring(0, j + 1);
                    lineEl.appendChild(cursor); // 保持光标在最后

                    // 随机停顿 (思考)
                    let delay = config.baseSpeed;
                    if (char === ';' || char === '}' || char === '{' || char === '\n') {
                        delay += Math.random() * 300 * config.pauseFactor + 200;
                    } else if (Math.random() > 0.9) {
                        delay += Math.random() * 100; // 偶尔的卡顿
                    }

                    await sleep(delay);
                }

                // 行结束：应用高亮
                lineEl.innerHTML = highlightLine(lineText);
                lineEl.appendChild(cursor); // 把光标放回去
                
                // 换行逻辑：如果还有下一行，把光标移到下一行开头
                if (i < lines.length - 1) {
                    // 添加一个换行符视觉效果（其实 div 自带换行）
                    // 移动光标 DOM 节点
                    lineElements[i+1].appendChild(cursor);
                    await sleep(100); // 换行小停顿
                }
            }
            
            // 结束
            cursor.style.animation = 'none';
            cursor.style.opacity = '1';
            isTyping = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 摄像机循环 (Camera Loop)
        function animateCamera() {
            if (!isTyping && Math.abs(cameraY - targetY) < 1) {
                // 如果没在打字且位置已对齐，减少计算
                // 但为了保持微小的呼吸感/晃动，我们继续运行
            }

            // 1. 线性插值 (Lerp) 实现延迟跟随
            // cameraY 是当前摄像机 Y 偏移量
            // targetY 是目标行相对于 #world 顶部的距离
            // 我们希望 targetY 位于视口中心。
            // 视口中心相对于 #world 是 0 (因为 #world 初始 translate(-50%, -50%))
            // 所以我们需要移动 #world，使得 targetY 移动到 0 附近。
            // 目标偏移量 = -targetY + (视口高度/2) - (行高/2)
            
            const viewportHeight = window.innerHeight;
            const lineHeight = 25.6; // 16px * 1.6
            
            // 计算理想的 #world translateY 值
            // 我们希望 lineEl 的 top 对齐到 视口中心偏上一点 (比如 40%)
            const idealWorldY = -(targetY - (viewportHeight * 0.4));

            // 平滑过渡
            cameraY += (idealWorldY - cameraY) * config.camera-lag;

            // 2. 添加晃动 (Shake)
            // 基于时间的噪声
            const time = Date.now() * 0.005;
            const shakeX = (Math.sin(time) * Math.cos(time * 2.3) + Math.random() - 0.5) * config.shakeIntensity;
            const shakeY = (Math.cos(time * 1.5) * Math.sin(time * 0.8) + Math.random() - 0.5) * config.shakeIntensity;

            // 应用变换
            // 保持 X 轴居中 (-50%)，Y 轴动态
            els.world.style.transform = `translate(calc(-50% + ${shakeX}px), calc(-50% + ${cameraY + shakeY}px))`;

            requestAnimationFrame(animateCamera);
        }

        // 启动摄像机循环
        animateCamera();

    </script>
</body>
</html>
