<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1 class="title">Code Visualizer</h1>
            <p class="subtitle">CODE_VISUALIZER</p>
        </header>

        <!-- 文件选择区 -->
        <div class="file-section">
            <label class="file-label">
                <input type="file" id="codeFile" accept=".py,.js,.cpp,.java,.txt" hidden>
                <span class="file-btn">📁 选择代码文件</span>
            </label>
            <p class="file-hint">支持 Python, JS, C++, Java 等</p>
        </div>

        <!-- 设置面板 -->
        <div class="settings-panel">
            <h3 class="settings-title">⚙️ 自定义设置</h3>
            
            <div class="setting-group">
                <label>
                    <span>🚀 播放速度</span>
                    <input type="range" id="speed" min="1" max="100" value="50">
                    <span class="value-display" id="speedValue">50</span>
                </label>
            </div>

            <div class="setting-group">
                <label>
                    <span>🤔 思考时间 (ms)</span>
                    <input type="range" id="thinkTime" min="0" max="2000" value="500">
                    <span class="value-display" id="thinkTimeValue">500</span>
                </label>
            </div>

            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="showLineNumbers" checked>
                    <span>📏 显示代码行数</span>
                </label>
            </div>

            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="cameraShake" checked>
                    <span>📷 相机摇晃效果</span>
                </label>
            </div>

            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="autoPlay" checked>
                    <span>▶️ 自动播放</span>
                </label>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button id="playBtn" class="control-btn">▶️ 播放</button>
            <button id="pauseBtn" class="control-btn">⏸️ 暂停</button>
            <button id="resetBtn" class="control-btn">🔄 重置</button>
        </div>

        <!-- 状态显示 -->
        <div class="status-bar">
            <span id="status">READY</span>
            <span class="line-counter" id="lineCounter">0 行</span>
        </div>

        <!-- 代码显示区 -->
        <div class="code-container" id="codeContainer">
            <div class="code-content" id="codeContent">
                <pre><code id="codeDisplay">// 等待加载代码...</code></pre>
            </div>
            <div class="line-numbers" id="lineNumbers"></div>
        </div>

        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
